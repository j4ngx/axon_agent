# =============================================================================
# Axon — Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d --build    # Build and start
#   docker compose logs -f axon     # Tail logs
#   docker compose down             # Stop
# =============================================================================

services:
  axon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axon
    restart: unless-stopped
    environment:
      - GOG_ACCOUNT=${GOG_ACCOUNT}
    volumes:
      - axon-data:/app/data
      - /Users/j4ngx/Library/Application Support/gogcli:/home/axon/.config/gogcli:ro
    stop_grace_period: 10s

volumes:
  axon-data:
    driver: local
