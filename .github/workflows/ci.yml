name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required for posting coverage comments
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Check formatting with Ruff
        run: uv run ruff format --check .

      - name: Secret Scanning
        run: |
          uv run detect-secrets scan --baseline .secrets.baseline > .secrets.new
          diff .secrets.baseline .secrets.new || (echo "New secrets detected!" && exit 1)

      - name: Run tests with coverage
        run: |
          uv run pytest --cov=src/axon --cov-report=term-missing --cov-report=json:coverage.json | tee coverage_output.txt

      - name: Post Coverage Comment
        if: github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message-id: coverage-report
          message: |
            ## 📊 Coverage Report
            ```text
            $(cat coverage_output.txt | sed -n '/Name/,/TOTAL/p')
            ```
            _Generated by GitHub Actions_
