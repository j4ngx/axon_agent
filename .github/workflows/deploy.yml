name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Publish Docker Image"]
    types: [completed]
    branches: [main]

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger homeserver deploy workflow
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.HOMESERVER_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/j4ngx/homeserver/dispatches \
            -d '{"event_type":"helix-deploy","client_payload":{"sha":"${{ github.sha }}","image":"ghcr.io/j4ngx/axon_agent:main"}}'
